name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=ios
      - run: flutter pub get
      - run: flutter build ios --config-only # Sirf config generate karega
      - run: |
          mkdir -p build/ios/iphoneos/Runner.app/Frameworks
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Settings.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPA-File
          path: Settings.ipa
